name: Provision S3 via Teams Approval

on:
  workflow_dispatch:
    inputs:
      aws_account:
        description: 'AWS Account'
        required: true
        type: string
      aws_region:
        description: 'AWS Region'
        required: true
        type: string
      bucket_name:
        description: 'Bucket Name'
        required: true
        type: string
      bucket_acl:
        description: 'Bucket ACL'
        required: true
        type: string
      storage_class:
        description: 'Storage Class'
        required: false
        type: string
        default: 'STANDARD'
      versioning:
        description: 'Enable Versioning'
        required: false
        type: string
        default: 'false'
      encryption:
        description: 'Encryption Type'
        required: false
        type: string
        default: 'AES256'
      kms_key_id:
        description: 'KMS Key ID'
        required: false
        type: string
        default: ''
      tags:
        description: 'Tags (JSON array)'
        required: false
        type: string
        default: '[]'
      port_context:
        description: Details of the Port action context (runId etc.)
        required: true
        type: string
      approved:
        description: 'Internal flag set by Logic App after Teams approval'
        required: false
        type: string
        default: 'false'

jobs:

# ✅ RUN #1 — APPROVAL GATE
  approval-gate:
    if: ${{ inputs.approved != 'true' }}
    runs-on: ubuntu-latest
    steps:
               
    
      - name: Post approval request to Logic App (Teams)
        env:
          LOGIC_APP_URL: ${{ secrets.LOGIC_APP_URL }}
        run: |
          if [ -z "$LOGIC_APP_URL" ]; then
            echo "Missing repo secret LOGIC_APP_URL"; exit 1
          fi

          # Parse tags (array) and port_context (object) into proper JSON
          TAGS_JSON=$(printf '%s' '${{ inputs.tags }}' | jq .)
          PORT_CONTEXT_OBJ=$(printf '%s' '${{ inputs.port_context }}' | jq .)

          cat > payload.json <<EOF
          {
            "owner": "${{ github.repository_owner }}",
            "repo": "${{ github.event.repository.name }}",
            "workflow_file": ".github/workflows/provision-s3-via-teams-approval.yml",
            "ref": "${{ github.ref_name }}",
            "requested_by": "${{ github.actor }}",
            "run_id": "${{ github.run_id }}",
            "aws_account": "${{ inputs.aws_account }}",
            "aws_region": "${{ inputs.aws_region }}",
            "bucket_name": "${{ inputs.bucket_name }}",
            "bucket_acl": "${{ inputs.bucket_acl }}",
            "storage_class": "${{ inputs.storage_class }}",
            "versioning": "${{ inputs.versioning }}",
            "encryption": "${{ inputs.encryption }}",
            "kms_key_id": "${{ inputs.kms_key_id }}",
            "tags": $TAGS_JSON,
            "port_context": $PORT_CONTEXT_OBJ
          }
          EOF

          cat payload.json

          curl -sS -X POST "$LOGIC_APP_URL" \
            -H "Content-Type: application/json" \
            --data-binary @payload.json
           

# ✅ RUN #2 — DEPLOY AFTER APPROVAL
  deploy-cloudformation-template:
    if: ${{ inputs.approved == 'true' }}
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials 🔒
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

   
      # ✅ REQUIRED — UNIQUE BUCKET + STACK NAME
             
      - name: Generate unique lowercase bucket name
        id: bucket
        run: |
          LOWER_NAME=$(echo "${{ inputs.bucket_name }}" | tr '[:upper:]' '[:lower:]')
          echo "BUCKET_NAME=${LOWER_NAME}-${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_ENV

      - name: Prepare Tags for CloudFormation
        id: prepare-tags
        run: |
          TAGS_INPUT='${{ inputs.tags }}'
          if [ "$TAGS_INPUT" != "[]" ] && [ ! -z "$TAGS_INPUT" ]; then
            CF_TAGS=$(echo "$TAGS_INPUT" | jq -r 'map("Key=\(.key),Value=\(.value)") | join(",")')
            echo "tags=$CF_TAGS" >> $GITHUB_OUTPUT
            echo "has_tags=true" >> $GITHUB_OUTPUT
          else
            echo "tags=" >> $GITHUB_OUTPUT
            echo "has_tags=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to AWS CloudFormation
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ env.BUCKET_NAME }}
          template: s3-bucket.yaml
          capabilities: CAPABILITY_NAMED_IAM
          no-fail-on-empty-changeset: "1"
          parameter-overrides: >-
            BucketName=${{ env.BUCKET_NAME }},
            VersioningEnabled=${{ inputs.versioning }},
            EncryptionType=${{ inputs.encryption }},
            KmsKeyId=${{ inputs.kms_key_id }}

      - name: Get CloudFormation Stack Outputs
        id: stack-outputs
        run: |
          BUCKET_ARN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.BUCKET_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketArn`].OutputValue' \
            --output text)
          echo "bucket_arn=$BUCKET_ARN" >> $GITHUB_OUTPUT